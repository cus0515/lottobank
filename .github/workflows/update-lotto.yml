name: Update Lotto Cache

on:
  schedule:
    # 토요일 20:35~20:55 KST (= UTC 11:35~11:55)
    - cron: '35 11 * * 6'
    - cron: '40 11 * * 6'
    - cron: '45 11 * * 6'
    - cron: '50 11 * * 6'
    - cron: '55 11 * * 6'
    # 토요일 21:00~21:30 KST (= UTC 12:00~12:30)
    - cron: '0 12 * * 6'
    - cron: '5 12 * * 6'
    - cron: '10 12 * * 6'
    - cron: '15 12 * * 6'
    - cron: '20 12 * * 6'
    - cron: '25 12 * * 6'
    - cron: '30 12 * * 6'
    # 평일 매일 21:00 KST — 혹시 놓친 회차 보완
    - cron: '0 12 * * 0,1,2,3,4,5'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest lotto result
        run: python3 scripts/fetch_lotto.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lotto-cache.json
          if git diff --staged --quiet; then
            echo "No changes — cache is already up to date"
          else
            git commit -m "chore: update lotto cache $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
