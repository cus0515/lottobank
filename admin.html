<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LottoBank 관리자</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --red: #e11d48;
    --green: #16a34a;
    --bg: #f1f5f9;
    --white: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', -apple-system, sans-serif; }
  body { background: var(--bg); color: var(--text); min-height: 100vh; }

  /* 로그인 */
  #login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .login-box { background:var(--white); border-radius:16px; padding:36px 32px; width:340px; box-shadow:0 4px 24px rgba(0,0,0,.10); }
  .login-logo { font-size:22px; font-weight:900; color:var(--red); margin-bottom:4px; }
  .login-sub { font-size:12px; color:var(--muted); margin-bottom:24px; }
  .form-label { font-size:12px; font-weight:700; color:var(--muted); margin-bottom:4px; display:block; }
  .form-input { width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:13px; outline:none; margin-bottom:12px; }
  .form-input:focus { border-color:var(--red); }
  .btn-login { width:100%; padding:11px; background:var(--red); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; }
  .login-err { font-size:12px; color:var(--red); margin-top:8px; text-align:center; }

  /* 메인 레이아웃 */
  #admin-screen { display:none; }
  header { background:var(--white); border-bottom:3px solid var(--red); padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .header-logo { font-size:18px; font-weight:900; color:var(--red); }
  .header-info { font-size:12px; color:var(--muted); }
  .btn-logout { padding:6px 14px; background:none; border:1.5px solid var(--border); border-radius:6px; font-size:12px; font-weight:700; cursor:pointer; color:var(--muted); }

  .container { max-width:1200px; margin:0 auto; padding:24px 16px; }

  /* 탭 */
  .tabs { display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap; }
  .tab-btn { padding:8px 18px; border-radius:8px; border:1.5px solid var(--border); background:var(--white); font-size:13px; font-weight:700; cursor:pointer; color:var(--muted); transition:all .15s; }
  .tab-btn.on { background:var(--red); color:#fff; border-color:var(--red); }

  /* 테이블 */
  .table-wrap { background:var(--white); border-radius:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .table-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  .table-title { font-size:14px; font-weight:900; }
  .table-actions { display:flex; gap:8px; align-items:center; }
  .search-input { padding:7px 12px; border:1.5px solid var(--border); border-radius:7px; font-size:12px; outline:none; width:200px; }
  .search-input:focus { border-color:var(--red); }
  .btn-refresh { padding:7px 14px; background:var(--bg); border:1.5px solid var(--border); border-radius:7px; font-size:12px; font-weight:700; cursor:pointer; }
  .btn-refresh:hover { border-color:var(--red); color:var(--red); }
  .admin-form { background:var(--white); border-radius:12px; padding:18px; box-shadow:0 2px 8px rgba(0,0,0,.06); margin-bottom:16px; }
  .form-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; }
  .form-grid .form-input { margin-bottom:0; }
  .form-actions { display:flex; gap:8px; margin-top:14px; }
  .btn-save { padding:10px 16px; border:0; border-radius:7px; background:var(--red); color:#fff; font-size:12px; font-weight:800; cursor:pointer; }
  .form-result { margin-top:10px; font-size:12px; color:var(--muted); }
  @media (max-width:700px) { .form-grid { grid-template-columns:1fr; } }

  table { width:100%; border-collapse:collapse; font-size:12px; }
  th { padding:10px 12px; text-align:left; font-size:11px; font-weight:700; color:var(--muted); border-bottom:1px solid var(--border); background:#f8fafc; white-space:nowrap; }
  td { padding:9px 12px; border-bottom:1px solid var(--border); color:var(--text); max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:#fef2f2; }

  .btn-del { padding:3px 10px; background:#fff5f5; border:1px solid #fecaca; border-radius:5px; font-size:11px; font-weight:700; color:#dc2626; cursor:pointer; }
  .btn-del:hover { background:#dc2626; color:#fff; }

  .badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; }
  .badge-green { background:#dcfce7; color:#16a34a; }
  .badge-red { background:#fef2f2; color:#dc2626; }
  .badge-blue { background:#dbeafe; color:#2563eb; }
  .badge-gray { background:#f1f5f9; color:#64748b; }

  .loading { padding:40px; text-align:center; color:var(--muted); font-size:13px; }
  .count-badge { font-size:11px; color:var(--muted); font-weight:600; }

  /* 모달 */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--white); border-radius:14px; padding:24px; width:480px; max-width:95vw; max-height:80vh; overflow-y:auto; }
  .modal-title { font-size:15px; font-weight:900; margin-bottom:16px; }
  .modal-row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); font-size:12px; }
  .modal-row:last-child { border-bottom:none; }
  .modal-key { color:var(--muted); font-weight:600; min-width:120px; }
  .modal-val { color:var(--text); word-break:break-all; text-align:right; }
  .btn-close-modal { margin-top:16px; width:100%; padding:9px; background:var(--bg); border:1.5px solid var(--border); border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; }

  .pagination { display:flex; gap:6px; justify-content:center; padding:12px; }
  .page-btn { padding:5px 12px; border:1.5px solid var(--border); border-radius:6px; background:var(--white); font-size:12px; font-weight:700; cursor:pointer; }
  .page-btn.on { background:var(--red); color:#fff; border-color:var(--red); }
  .page-btn:hover:not(.on) { border-color:var(--red); color:var(--red); }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">LottoBank</div>
    <div class="login-sub">관리자 전용 페이지</div>
    <label class="form-label">이메일</label>
    <input class="form-input" type="email" id="adm-email" value="jobdevil23@gmail.com" placeholder="관리자 이메일">
    <label class="form-label">비밀번호</label>
    <input class="form-input" type="password" id="adm-pw" placeholder="비밀번호" onkeyup="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()">로그인</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- 관리자 화면 -->
<div id="admin-screen">
  <header>
    <div class="header-logo">LottoBank 관리자</div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="header-info" id="adm-user-label"></div>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn on" onclick="switchTab('users')">👤 유저</button>
      <button class="tab-btn" onclick="switchTab('tickets')">🎫 티켓</button>
      <button class="tab-btn" onclick="switchTab('posts')">📝 게시글</button>
      <button class="tab-btn" onclick="switchTab('comments')">💬 댓글</button>
      <button class="tab-btn" onclick="switchTab('chat')">🗨️ 채팅</button>
      <button class="tab-btn" onclick="switchTab('stats')">📊 전적</button>
      <button class="tab-btn" onclick="switchTab('data')">전체 데이터</button>
      <button class="tab-btn" onclick="switchTab('insert')">✏️ 직접 입력</button>
      <button class="tab-btn" onclick="switchTab('verify')">🔬 기능 검증</button>
    </div>

    <div id="table-area"></div>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">상세 정보</div>
    <div id="modal-body"></div>
    <button class="btn-close-modal" onclick="closeModal()">닫기</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://wosbpljbdyofavsbrkyn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_WhehbHhTwxo-9uEyWbEEtA_52ACEDbj';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentTab = 'users';
let currentPage = 1;
const PAGE_SIZE = 30;
let searchQuery = '';
const ADMIN_TABLES = [
  'profiles','tickets','user_stats','user_badges','activity_feed','chat_messages',
  'posts','comments','post_likes','ranking_snapshots','user_system_titles',
  'user_daily_visits','lottery_stores','user_lottery_stores'
];

// ── 로그인 ──────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('adm-email').value.trim();
  const pw = document.getElementById('adm-pw').value;
  const err = document.getElementById('login-err');
  err.textContent = '';
  if (!email || !pw) { err.textContent = '이메일과 비밀번호를 입력하세요.'; return; }
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
    if (error) throw error;
    // 관리자 확인 (이메일 체크)
    if (data.user.email !== 'jobdevil23@gmail.com') {
      await sb.auth.signOut();
      err.textContent = '관리자 계정이 아닙니다.';
      return;
    }
    document.getElementById('adm-user-label').textContent = data.user.email;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadTab('users');
  } catch(e) {
    err.textContent = e.message || '로그인 실패';
  }
}

async function doLogout() {
  await sb.auth.signOut();
  location.reload();
}

// ── 탭 전환 ─────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  currentPage = 1;
  searchQuery = '';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
  event.target.classList.add('on');
  loadTab(tab);
}

async function loadTab(tab) {
  const area = document.getElementById('table-area');
  area.innerHTML = '<div class="loading">불러오는 중...</div>';

  const configs = {
    users: { table: 'profiles', key: 'id', cols: ['id','nickname','created_at'], label: '유저 목록', searchCol: 'nickname' },
    tickets: { table: 'tickets', key: 'id', cols: ['id','user_id','round_no','prize_rank','numbers','created_at'], label: '티켓(QR 등록)', searchCol: 'round_no' },
    posts: { table: 'posts', key: 'id', cols: ['id','nickname','tag','title','likes','comment_count','created_at'], label: '게시글', searchCol: 'title' },
    comments: { table: 'comments', key: 'id', cols: ['id','post_id','nickname','body','created_at'], label: '댓글', searchCol: 'body' },
    chat: { table: 'chat_messages', key: 'id', cols: ['id','nickname','message','created_at'], label: '채팅', searchCol: 'nickname' },
    stats: { table: 'user_stats', key: 'user_id', order: 'updated_at', cols: ['user_id','total_tickets','total_spent','total_prize','total_wins','best_rank','updated_at'], label: '전적 통계', searchCol: 'user_id' },
  };

  if (tab === 'insert') {
    renderInsertForms();
    return;
  }
  if (tab === 'data') {
    renderDataManager();
    return;
  }
  if (tab === 'verify') {
    renderVerificationPanel();
    return;
  }

  const cfg = configs[tab];
  if (!cfg) return;

  try {
    let query = sb.from(cfg.table).select('*', { count: 'exact' });
    if (searchQuery && cfg.searchCol) {
      query = query.ilike(cfg.searchCol, `%${searchQuery}%`);
    }
    const from = (currentPage - 1) * PAGE_SIZE;
    query = query.order(cfg.order || 'created_at', { ascending: false }).range(from, from + PAGE_SIZE - 1);

    const { data, error, count } = await query;
    if (error) throw error;

    renderTable(cfg, data || [], count || 0);
  } catch(e) {
    area.innerHTML = `<div class="loading" style="color:#dc2626;">오류: ${e.message}</div>`;
  }
}

function renderDataManager() {
  document.getElementById('table-area').innerHTML = `
    <div class="admin-form">
      <div class="table-title">전체 기능 데이터 관리</div>
      <div style="font-size:12px;color:var(--muted);margin-top:6px;">테이블을 선택하고 JSON으로 직접 입력·수정·삭제할 수 있습니다.</div>
      <div class="form-grid" style="margin-top:14px;">
        <div>
          <label class="form-label">테이블</label>
          <select class="form-input" id="data-table" onchange="loadDataManagerRows()">${ADMIN_TABLES.map(t=>`<option value="${t}">${t}</option>`).join('')}</select>
        </div>
        <div>
          <label class="form-label">조건 JSON</label>
          <input class="form-input" id="data-filter" placeholder='{"id":"UUID"}'>
        </div>
      </div>
      <label class="form-label" style="margin-top:10px;">입력 또는 수정 데이터 JSON</label>
      <textarea class="form-input" id="data-payload" rows="8" style="resize:vertical;font-family:Consolas,monospace;" placeholder='{"user_id":"UUID","field":"value"}'></textarea>
      <div class="form-actions">
        <button class="btn-save" onclick="runDataAction('insert')">입력</button>
        <button class="btn-refresh" onclick="runDataAction('update')">수정</button>
        <button class="btn-del" onclick="runDataAction('delete')">삭제</button>
        <button class="btn-refresh" onclick="loadDataManagerRows()">조회</button>
        <button class="btn-refresh" onclick="checkAdminDatabase()">DB 연결 점검</button>
      </div>
      <div class="form-result" id="data-result"></div>
    </div>
    <div class="table-wrap"><div class="table-header"><span class="table-title">최근 데이터 50건</span></div><pre id="data-rows" style="padding:14px;margin:0;overflow:auto;max-height:520px;font-size:11px;line-height:1.6;">불러오는 중...</pre></div>`;
  loadDataManagerRows();
}

async function checkAdminDatabase() {
  const result = document.getElementById('data-result');
  result.style.color = 'var(--muted)';
  result.textContent = '전체 테이블 확인 중...';
  const checks = await Promise.all(ADMIN_TABLES.map(async table => {
    const { error } = await sb.from(table).select('*', { count:'exact', head:true });
    return { table, error:error?.message || null };
  }));
  const failed = checks.filter(item=>item.error);
  result.style.color = failed.length ? 'var(--red)' : 'var(--green)';
  result.textContent = failed.length
    ? `연결 실패 ${failed.length}개: ${failed.map(item=>`${item.table}(${item.error})`).join(' / ')}`
    : `전체 ${checks.length}개 테이블 연결 정상`;
}

function readAdminJson(id, required = false) {
  const value = document.getElementById(id).value.trim();
  if (!value) {
    if (required) throw new Error('JSON을 입력하세요.');
    return {};
  }
  const parsed = JSON.parse(value);
  if (!parsed || Array.isArray(parsed) || typeof parsed !== 'object') throw new Error('JSON 객체 형식이어야 합니다.');
  return parsed;
}

function applyAdminFilters(query, filters) {
  Object.entries(filters).forEach(([key,value]) => { query = query.eq(key, value); });
  return query;
}

async function loadDataManagerRows() {
  const table = document.getElementById('data-table')?.value;
  const rows = document.getElementById('data-rows');
  if (!table || !rows) return;
  rows.textContent = '불러오는 중...';
  try {
    const { data, error } = await sb.from(table).select('*').limit(50);
    if (error) throw error;
    rows.textContent = JSON.stringify(data || [], null, 2);
  } catch (e) {
    rows.textContent = `오류: ${e.message}`;
  }
}

async function runDataAction(action) {
  const table = document.getElementById('data-table').value;
  const result = document.getElementById('data-result');
  try {
    const filters = readAdminJson('data-filter', action !== 'insert');
    const payload = action === 'delete' ? null : readAdminJson('data-payload', true);
    let response;
    if (action === 'insert') response = await sb.from(table).insert(payload).select();
    if (action === 'update') response = await applyAdminFilters(sb.from(table).update(payload), filters).select();
    if (action === 'delete') {
      if (!confirm(`${table} 조건 데이터를 삭제하시겠습니까?`)) return;
      response = await applyAdminFilters(sb.from(table).delete(), filters).select();
    }
    if (response.error) throw response.error;
    result.style.color = 'var(--green)';
    result.textContent = `${action} 완료 · ${response.data?.length || 0}건`;
    await loadDataManagerRows();
  } catch (e) {
    result.style.color = 'var(--red)';
    result.textContent = e.message;
  }
}

function renderTable(cfg, rows, total) {
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const area = document.getElementById('table-area');

  const colLabels = {
    id:'ID', user_id:'유저ID', nickname:'닉네임', email:'이메일', created_at:'생성일',
    updated_at:'수정일', round_no:'회차', prize_rank:'등수', numbers:'번호', tag:'태그',
    title:'제목', body:'내용', likes:'좋아요', comment_count:'댓글수', message:'메시지',
    total_tickets:'총게임', total_spent:'총투자', total_prize:'총당첨', total_wins:'당첨수',
    best_rank:'최고등수', post_id:'게시글ID',
  };

  let html = `
  <div class="table-wrap">
    <div class="table-header">
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="table-title">${cfg.label}</span>
        <span class="count-badge">총 ${total.toLocaleString()}건</span>
      </div>
      <div class="table-actions">
        <input class="search-input" placeholder="검색..." value="${searchQuery}"
          onkeyup="if(event.key==='Enter'){searchQuery=this.value;currentPage=1;loadTab('${cfg.table==='profiles'?'users':currentTab}')}"
          oninput="searchQuery=this.value">
        <button class="btn-refresh" onclick="currentPage=1;loadTab('${currentTab}')">새로고침</button>
      </div>
    </div>
    <div style="overflow-x:auto;">
    <table>
      <thead><tr>
        ${cfg.cols.map(c=>`<th>${colLabels[c]||c}</th>`).join('')}
        <th>액션</th>
      </tr></thead>
      <tbody>
        ${rows.length === 0 ? `<tr><td colspan="${cfg.cols.length+1}" style="text-align:center;color:var(--muted);padding:30px;">데이터 없음</td></tr>` :
          rows.map(row => `
          <tr onclick="showDetail(${JSON.stringify(JSON.stringify(row))})" style="cursor:pointer;">
            ${cfg.cols.map(c => {
              let val = row[c];
              if (val === null || val === undefined) val = '-';
              if (c === 'created_at' || c === 'updated_at') val = val !== '-' ? new Date(val).toLocaleString('ko-KR') : '-';
              if (c === 'prize_rank') val = val !== '-' ? `<span class="badge ${val<=2?'badge-red':val<=3?'badge-blue':'badge-gray'}">${val}등</span>` : '-';
              if (c === 'id' || c === 'user_id' || c === 'post_id') val = `<span style="font-size:10px;color:var(--muted);">${String(val).slice(0,8)}...</span>`;
              if (c === 'total_spent' || c === 'total_prize') val = val !== '-' ? Number(val).toLocaleString()+'원' : '-';
              return `<td>${val}</td>`;
            }).join('')}
            <td onclick="event.stopPropagation()">
              <button class="btn-del" onclick="deleteRow('${cfg.table}','${cfg.key}','${row[cfg.key]}')">${cfg.table==='tickets'?'QR 삭제':'삭제'}</button>
            </td>
          </tr>`
          ).join('')}
      </tbody>
    </table>
    </div>
    ${totalPages > 1 ? `
    <div class="pagination">
      ${currentPage > 1 ? `<button class="page-btn" onclick="changePage(${currentPage-1})">◀</button>` : ''}
      ${Array.from({length:Math.min(totalPages,10)}, (_,i)=>i+1).map(p=>
        `<button class="page-btn ${p===currentPage?'on':''}" onclick="changePage(${p})">${p}</button>`
      ).join('')}
      ${currentPage < totalPages ? `<button class="page-btn" onclick="changePage(${currentPage+1})">▶</button>` : ''}
    </div>` : ''}
  </div>`;

  area.innerHTML = html;
}

function changePage(p) {
  currentPage = p;
  loadTab(currentTab);
}

async function deleteRow(table, key, id) {
  if (!confirm(`${table==='tickets'?'등록된 QR과 티켓 이력을':'데이터를'} 삭제하시겠습니까?\n테이블: ${table}\n${key}: ${id}`)) return;
  try {
    const { error } = await sb.from(table).delete().eq(key, id);
    if (error) throw error;
    alert('삭제되었습니다.');
    loadTab(currentTab);
  } catch(e) {
    alert('삭제 실패: ' + e.message);
  }
}

async function getAdminTestContext() {
  const { data:{ session } } = await sb.auth.getSession();
  if (!session || session.user.email !== 'jobdevil23@gmail.com') throw new Error('관리자 로그인이 필요합니다.');
  const { data:profile } = await sb.from('profiles').select('nickname').eq('id', session.user.id).maybeSingle();
  return { user:session.user, nickname:profile?.nickname || '관리자' };
}

async function createAdvancedVerificationData() {
  const result = document.getElementById('verify-result');
  result.style.color = 'var(--muted)';
  result.textContent = '선택된 시나리오 생성 중...';

  const selected = VERIFY_SCENARIOS.filter(s => document.getElementById('sc-'+s.id)?.checked);
  if (!selected.length) { result.style.color='var(--red)'; result.textContent='시나리오를 하나 이상 선택하세요.'; return; }

  try {
    const { user, nickname } = await getAdminTestContext();
    const lottoRound = Number(document.getElementById('verify-round').value) || 9999;
    const penRound   = Number(document.getElementById('verify-pen-round').value) || 321;
    await cleanupVerificationData(false);
    const month = 'admin-test';

    const jobs = [];
    const allBadges = new Set(['admin_test']);
    let chatTitles = [];
    let feedItems  = [];
    let ticketIdx  = 0;

    for (const sc of selected) {
      const isLotto   = sc.type === 'lotto'   || sc.type === 'both';
      const isPension = sc.type === 'pension'  || sc.type === 'both';
      const lRound = lottoRound + ticketIdx;
      const pRound = penRound   + ticketIdx;
      ticketIdx++;

      // 티켓 삽입
      if (isLotto) {
        jobs.push(sb.from('tickets').insert({
          user_id:user.id, qr_url:`admin-test:lotto:${lRound}:${sc.rank}`,
          round_no:lRound, numbers:[1,2,3,4,5,6], game_count:1,
          result:'checked', prize_rank:sc.rank, prize_amount:sc.prize,
          lottery_type:'lotto',
        }));
      }
      if (isPension) {
        jobs.push(sb.from('tickets').insert({
          user_id:user.id, qr_url:`admin-test:pension:${pRound}:${sc.rank}`,
          round_no:pRound, numbers:[1,2,3,4,5,6], game_count:1,
          result:'checked', prize_rank:sc.rank, prize_amount:sc.prize,
          lottery_type:'pension',
        }));
      }

      // 칭호 삽입 (1·2등만)
      if (sc.title && isLotto && sc.rank <= 2) {
        const t = `로또 ${sc.rank}등`;
        chatTitles.push(t);
        jobs.push(sb.from('user_system_titles').insert({
          user_id:user.id, title_type:'admin_test', title:t,
          lottery_type:'lotto', round_no:lRound, prize_rank:sc.rank,
          period_key:month, badge_icon:sc.rank===1?'🥇':'🥈',
          border_color:sc.rank===1?'#fbbf24':'#c0c0c0', active:true,
        }));
      }
      if (sc.title && isPension && sc.rank <= 2) {
        const t = `연금 ${sc.rank}등`;
        chatTitles.push(t);
        jobs.push(sb.from('user_system_titles').insert({
          user_id:user.id, title_type:'admin_test', title:t,
          lottery_type:'pension', round_no:pRound, prize_rank:sc.rank,
          period_key:month, badge_icon:sc.rank===1?'🏆':'🥈',
          border_color:sc.rank===1?'#7c3aed':'#6366f1', active:true,
        }));
      }

      // 랭킹 스냅샷 (1등만)
      if (sc.rankSnap && isLotto) {
        jobs.push(sb.from('ranking_snapshots').upsert({
          period_key:month, ranking_type:'purchase',
          user_id:user.id, rank:1, score:1000000 + sc.prize,
          title:'구매왕', badge_icon:'👑', border_color:'#22c55e',
        }, { onConflict:'period_key,ranking_type,user_id' }));
      }

      // 피드
      if (isLotto) feedItems.push({ type:'win', data:{ admin_test:true, round:lRound, rank:sc.rank, prize:sc.prize } });
      if (isPension) feedItems.push({ type:'win', data:{ admin_test:true, round:pRound, rank:sc.rank, prize:sc.prize } });

      // 뱃지
      sc.badges.forEach(b => allBadges.add(b));
    }

    // 뱃지 풀세트 추가 지원 (badges_all 시나리오)
    if (selected.some(s => s.id === 'badges_all')) {
      // 5등 헌터: 5회, 4등 헌터: 3회
      for (let i = 0; i < 5; i++) {
        jobs.push(sb.from('tickets').insert({
          user_id:user.id, qr_url:`admin-test:rank5:${i}`, round_no:9000+i,
          numbers:[1,2,3,4,5,6], game_count:1, result:'checked',
          prize_rank:5, prize_amount:5000, lottery_type:'lotto',
        }));
      }
      for (let i = 0; i < 3; i++) {
        jobs.push(sb.from('tickets').insert({
          user_id:user.id, qr_url:`admin-test:rank4:${i}`, round_no:8000+i,
          numbers:[1,2,3,4,5,6], game_count:1, result:'checked',
          prize_rank:4, prize_amount:50000, lottery_type:'lotto',
        }));
      }
      for (let i = 0; i < 10; i++) {
        jobs.push(sb.from('tickets').insert({
          user_id:user.id, qr_url:`admin-test:reg:${i}`, round_no:7000+i,
          numbers:[1,2,3,4,5,6], game_count:1, result:'pending',
          prize_rank:null, prize_amount:0, lottery_type:'lotto',
        }));
      }
      for (let i = 0; i < 5; i++) {
        jobs.push(sb.from('tickets').insert({
          user_id:user.id, qr_url:`admin-test:pen:${i}`, round_no:300+i,
          numbers:[1,2,3,4,5,6], game_count:1, result:'pending',
          prize_rank:null, prize_amount:0, lottery_type:'pension',
        }));
      }
      // user_stats
      jobs.push(sb.from('user_stats').upsert({
        user_id:user.id, total_tickets:120, total_spent:1200000,
        total_wins:20, total_prize:2100000000, best_rank:1,
        rank_1_count:1, rank_2_count:1, rank_3_count:1, rank_4_count:3, rank_5_count:5,
      }, { onConflict:'user_id' }));
    }

    // 채팅 (선택된 칭호 중 대표 하나)
    const chatTitle = chatTitles.length ? [...new Set(chatTitles)].join(' / ') : null;
    if (chatTitle) {
      jobs.push(sb.from('chat_messages').insert({
        user_id:user.id, nickname, verified_title:chatTitle,
        message:`[관리자 검증] ${chatTitle} 채팅 칭호 검증`,
      }));
    }

    // 피드 (각 당첨 항목)
    feedItems.forEach(f => {
      jobs.push(sb.from('activity_feed').insert({
        user_id:user.id, nick:nickname, type:f.type, data:f.data,
      }));
    });

    // 뱃지
    const badgeRows = [...allBadges].map(b => ({ user_id:user.id, badge_id:b }));
    jobs.push(sb.from('user_badges').upsert(badgeRows, { onConflict:'user_id,badge_id', ignoreDuplicates:true }));

    // 방문
    jobs.push(sb.from('user_daily_visits').insert({ user_id:user.id, visit_date:'2099-12-31' }));

    const results = await Promise.allSettled(jobs);
    const errors = results.filter(r=>r.status==='rejected'||r.value?.error).map(r=>r.reason?.message||r.value?.error?.message).filter(Boolean);
    if (errors.length) {
      result.style.color='var(--red)';
      result.textContent='일부 오류: ' + errors.join(' / ');
    } else {
      result.style.color='var(--green)';
      result.textContent=`✅ ${selected.length}개 시나리오 생성 완료. 메인 검증 화면에서 확인하세요.`;
      // 메인 창에 _systemRankTitle 즉시 재로드 요청
      if (window.opener && window.opener.syncDailyVisitAndSystemTitle) {
        window.opener.syncDailyVisitAndSystemTitle();
      }
    }
  } catch (e) {
    result.style.color='var(--red)';
    result.textContent=e.message;
  }
}

async function cleanupVerificationData(showResult = true) {
  const result = document.getElementById('verify-result');
  try {
    const { user } = await getAdminTestContext();
    const jobs = [
      sb.from('tickets').delete().eq('user_id',user.id).like('qr_url','admin-test:%'),
      sb.from('user_system_titles').delete().eq('user_id',user.id).eq('title_type','admin_test'),
      sb.from('ranking_snapshots').delete().eq('user_id',user.id).eq('period_key','admin-test'),
      sb.from('chat_messages').delete().eq('user_id',user.id).like('message','[관리자 검증]%'),
      sb.from('activity_feed').delete().eq('user_id',user.id).contains('data',{ admin_test:true }),
      sb.from('user_badges').delete().eq('user_id',user.id).in('badge_id',
        ['admin_test','first_reg','first_win','reg_10','rank5','rank4','rank3','rank2','rank1',
         'roi_pos','big_spender','pension_first','pension_5']),
      sb.from('user_daily_visits').delete().eq('user_id',user.id).eq('visit_date','2099-12-31'),
      sb.from('user_stats').upsert({
        user_id:user.id, total_tickets:0, total_spent:0, total_wins:0, total_prize:0,
        best_rank:null, rank_1_count:0, rank_2_count:0, rank_3_count:0, rank_4_count:0, rank_5_count:0,
      }, { onConflict:'user_id' }),
    ];
    const results = await Promise.allSettled(jobs);
    const errors = results.filter(r=>r.status==='rejected'||r.value?.error).map(r=>r.reason?.message||r.value?.error?.message).filter(Boolean);
    if (errors.length) throw new Error(errors.join(' / '));
    if (showResult && result) {
      result.style.color = 'var(--green)';
      result.textContent = '✅ 테스트 데이터 전체 정리 완료.';
    }
  } catch (e) {
    if (showResult && result) {
      result.style.color = 'var(--red)';
      result.textContent = e.message;
    } else {
      throw e;
    }
  }
}

async function findUserId(nickname) {
  const { data, error } = await sb.from('profiles').select('id').eq('nickname', nickname).maybeSingle();
  if (error) throw error;
  if (!data) throw new Error('해당 닉네임의 회원을 찾을 수 없습니다.');
  return data.id;
}

let _insType = 'lotto';
function switchInsertType(t) {
  _insType = t;
  document.getElementById('ins-lotto-section').style.display = t==='lotto' ? '' : 'none';
  document.getElementById('ins-pension-section').style.display = t==='pension' ? '' : 'none';
  document.getElementById('ins-type-lotto').style.cssText = t==='lotto'
    ? 'flex:1;padding:7px;border-radius:7px;border:2px solid #dc2626;background:#dc2626;color:#fff;font-size:12px;font-weight:800;cursor:pointer;'
    : 'flex:1;padding:7px;border-radius:7px;border:2px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;';
  document.getElementById('ins-type-pension').style.cssText = t==='pension'
    ? 'flex:1;padding:7px;border-radius:7px;border:2px solid #16a34a;background:#16a34a;color:#fff;font-size:12px;font-weight:800;cursor:pointer;'
    : 'flex:1;padding:7px;border-radius:7px;border:2px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;';
  const rankSel = document.getElementById('ins-ticket-rank');
  if (t === 'pension') {
    rankSel.innerHTML = '<option value="">미당첨</option><option value="1">1등</option><option value="2">2등</option><option value="3">3등</option><option value="4">4등</option><option value="5">5등</option><option value="6">6등</option><option value="7">7등</option>';
  } else {
    rankSel.innerHTML = '<option value="">미당첨</option><option value="1">1등</option><option value="2">2등</option><option value="3">3등</option><option value="4">4등</option><option value="5">5등</option>';
  }
}
const _gameLabels = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

function _randLotto() {
  const pool = Array.from({length:45},(_,i)=>i+1);
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  return pool.slice(0,6).sort((a,b)=>a-b).join(', ');
}
function fillRowRandom(btn) {
  const inp = btn.parentElement.querySelector('input');
  if (inp) inp.value = _randLotto();
}
function fillAllRandom() {
  document.querySelectorAll('#ins-lotto-games .ins-game-row input').forEach(inp => { inp.value = _randLotto(); });
}
function fillPensionRandom() {
  const jo = Math.floor(Math.random()*5)+1;
  const no = String(Math.floor(Math.random()*1000000)).padStart(6,'0');
  const joEl = document.getElementById('ins-pension-jo');
  const noEl = document.getElementById('ins-pension-no');
  if(joEl) joEl.value = jo;
  if(noEl) noEl.value = no;
}
function addLottoGameRow() {
  const box = document.getElementById('ins-lotto-games');
  const idx = box.children.length;
  if (idx >= 10) { alert('최대 10게임까지 입력할 수 있습니다.'); return; }
  const row = document.createElement('div');
  row.className = 'ins-game-row';
  row.style.cssText = 'display:flex;align-items:center;gap:6px;margin-bottom:5px;';
  row.innerHTML = `<span style="font-size:11px;font-weight:700;width:16px;color:var(--muted);">${_gameLabels[idx]}</span>
    <input class="form-input" placeholder="비우면 랜덤 자동 입력" style="flex:1;margin:0;">
    <button onclick="fillRowRandom(this)" title="랜덤" style="border:none;background:#6366f1;color:#fff;border-radius:4px;padding:3px 7px;font-size:11px;cursor:pointer;">🎲</button>
    <button onclick="this.parentElement.remove()" style="border:none;background:none;color:#94a3b8;font-size:16px;cursor:pointer;padding:0 4px;">×</button>`;
  box.appendChild(row);
}
async function insertTicket() {
  const result = document.getElementById('ins-ticket-result');
  result.textContent = '저장 중...'; result.style.color = 'var(--muted)';
  try {
    const nickname = document.getElementById('ins-ticket-nick').value.trim();
    const roundNo = Number(document.getElementById('ins-ticket-round').value);
    if (!nickname || !roundNo) throw new Error('닉네임과 회차를 입력하세요.');
    const rankValue = document.getElementById('ins-ticket-rank').value;
    const userId = await findUserId(nickname);
    const purchaseDate = document.getElementById('ins-ticket-date').value || new Date().toISOString().slice(0,10);
    const prizeAmt = Number(document.getElementById('ins-ticket-prize').value) || 0;

    if (_insType === 'pension') {
      // 연금복권 단건 저장
      const joRaw = document.getElementById('ins-pension-jo').value.trim();
      const noRaw = document.getElementById('ins-pension-no').value.trim();
      const jo = joRaw ? Number(joRaw) : Math.floor(Math.random()*5)+1;
      const no = noRaw || String(Math.floor(Math.random()*1000000)).padStart(6,'0');
      if (jo < 1 || jo > 5) throw new Error('조는 1~5 사이 숫자를 입력하세요.');
      if (!/^\d{6}$/.test(no)) throw new Error('번호는 6자리 숫자를 입력하세요.');
      const payload = {
        user_id: userId,
        qr_url: `admin://pension/${roundNo}/${jo}/${no}/${crypto.randomUUID().slice(0,8)}`,
        round_no: roundNo,
        lottery_type: 'pension',
        pension_group: jo,
        pension_number: no,
        numbers: [],
        game_numbers: [],
        purchase_date: purchaseDate,
        result: 'checked',
        prize_rank: rankValue ? Number(rankValue) : null,
        prize_amount: prizeAmt,
      };
      const { error } = await sb.from('tickets').insert(payload);
      if (error) throw error;
      result.style.color='var(--green)'; result.textContent='연금복권 티켓 저장 완료.';
    } else {
      // 로또: 다중 게임 저장 (빈칸 → 랜덤)
      const rows = document.querySelectorAll('#ins-lotto-games .ins-game-row');
      const allGames = [];
      for (const row of rows) {
        const inp = row.querySelector('input');
        if (!inp.value.trim()) {
          // 빈칸이면 랜덤 생성
          const pool = Array.from({length:45},(_,i)=>i+1);
          for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
          allGames.push(pool.slice(0,6).sort((a,b)=>a-b));
        } else {
          const nums = inp.value.split(',').map(v=>Number(v.trim())).filter(n=>Number.isInteger(n)&&n>=1&&n<=45);
          if (nums.length !== 6 || new Set(nums).size !== 6) throw new Error(`번호가 잘못되었습니다: "${inp.value}" (중복없는 6개, 1~45)`);
          allGames.push(nums.sort((a,b)=>a-b));
        }
      }
      if (!allGames.length) throw new Error('게임 행을 최소 1개 추가하세요.');
      const payload = {
        user_id: userId,
        qr_url: `admin://manual/${crypto.randomUUID()}`,
        round_no: roundNo,
        lottery_type: 'lotto',
        numbers: allGames[0],
        game_numbers: allGames,
        game_count: allGames.length,
        purchase_date: purchaseDate,
        result: 'checked',
        prize_rank: rankValue ? Number(rankValue) : null,
        prize_amount: prizeAmt,
      };
      const { error } = await sb.from('tickets').insert(payload);
      if (error) throw error;
      result.style.color='var(--green)'; result.textContent=`로또 티켓 ${allGames.length}게임 저장 완료.`;
    }
  } catch (e) {
    result.style.color = 'var(--red)';
    result.textContent = e.message;
  }
}

async function upsertStats() {
  const result = document.getElementById('ins-stat-result');
  try {
    const nickname = document.getElementById('ins-stat-nick').value.trim();
    if (!nickname) throw new Error('닉네임을 입력하세요.');
    const userId = await findUserId(nickname);
    const bestRank = Number(document.getElementById('ins-stat-best').value);
    const payload = {
      user_id: userId,
      total_tickets: Number(document.getElementById('ins-stat-tickets').value) || 0,
      total_spent: Number(document.getElementById('ins-stat-spent').value) || 0,
      total_prize: Number(document.getElementById('ins-stat-prize').value) || 0,
      total_wins: Number(document.getElementById('ins-stat-wins').value) || 0,
      best_rank: bestRank >= 1 && bestRank <= 5 ? bestRank : null,
      updated_at: new Date().toISOString(),
    };
    const { error } = await sb.from('user_stats').upsert(payload, { onConflict:'user_id' });
    if (error) throw error;
    result.style.color = 'var(--green)';
    result.textContent = '전적을 저장했습니다.';
  } catch (e) {
    result.style.color = 'var(--red)';
    result.textContent = e.message;
  }
}

function showDetail(jsonStr) {
  const obj = JSON.parse(jsonStr);
  document.getElementById('modal-title').textContent = '상세 정보';
  const body = document.getElementById('modal-body');
  body.innerHTML = Object.entries(obj).map(([k,v]) => {
    let display = v;
    if (v === null || v === undefined) display = '-';
    if (k.includes('_at') && v) display = new Date(v).toLocaleString('ko-KR');
    return `<div class="modal-row"><span class="modal-key">${k}</span><span class="modal-val">${display}</span></div>`;
  }).join('');
  document.getElementById('detail-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('detail-modal').classList.remove('open');
}

document.getElementById('detail-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
